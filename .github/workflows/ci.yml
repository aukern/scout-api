name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 04:00 UTC — mutation tests

env:
  APP_ENV: dev
  PYTHON_VERSION: "3.12"

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps

      - name: Run unit tests
        run: pytest tests/ -q --tb=short -m "not integration"

  # ── Integration Tests ─────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps

      - name: Run database migrations
        run: python scripts/migrate.py
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run integration tests
        run: pytest tests/ -q --tb=short -m "integration" --timeout=60
        env:
          APP_ENV: dev
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0

  # ── Performance Benchmarks ────────────────────────────────────────────────────
  # Runs on push to main only — benchmarks are noisy on shared runners.
  # Fails if any benchmark regresses > 10% vs the stored baseline.
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps
          pip install pytest-benchmark

      - name: Restore benchmark baseline
        uses: actions/cache@v4
        with:
          path: .benchmarks/
          key: benchmarks-${{ github.ref_name }}
          restore-keys: benchmarks-main

      - name: Run benchmarks
        run: |
          # Skip if no benchmark tests exist (pytest exit 5 = no tests collected)
          if ! pytest --co -q -m "benchmark" tests/ 2>/dev/null | grep -q "::"; then
            echo "No @pytest.mark.benchmark tests found — skipping"
            exit 0
          fi
          COMPARE_ARGS=""
          if [ -d .benchmarks ] && [ "$(ls -A .benchmarks 2>/dev/null)" ]; then
            COMPARE_ARGS="--benchmark-compare --benchmark-compare-fail=mean:10%"
          fi
          pytest tests/ -m "benchmark" \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-save=current \
            $COMPARE_ARGS \
            -q --tb=short
        env:
          APP_ENV: dev
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Save benchmark baseline
        if: hashFiles('benchmark-results.json') != ''
        uses: actions/cache@v4
        with:
          path: .benchmarks/
          key: benchmarks-${{ github.sha }}

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('benchmark-results.json') != ''
        with:
          name: benchmark-report
          path: benchmark-results.json
          retention-days: 30

  # ── Mutation Tests ────────────────────────────────────────────────────────────
  # Runs weekly (Monday 04:00 UTC) and on push to main.
  # Gate: ≥80% of introduced mutations must be caught by the test suite.
  # Scope: src/ only — not infra wrappers or generated code.
  mutation:
    name: Mutation Tests
    runs-on: ubuntu-latest
    needs: [test, lint, security, coverage, integration, docker, lockfile, sbom]
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps
          pip install "mutmut<3"

      - name: Run mutation tests
        run: |
          # Warm up: run tests once so imports are cached. Without this, mutmut's
          # baseline measurement sees cold-start latency and every mutant times out.
          python -m pytest tests/ -x -q --tb=no -m "not integration" > /dev/null 2>&1 || true
          # Mutate only domain logic (slice service/repository files), not scaffolded
          # infrastructure (main.py, errors.py, health.py, observability.py, etc.).
          MUTATE_PATHS=$(find src/ \( -path "*/contracts.py" -o -path "*/service.py" -o -path "*/repository.py" \) | tr '\n' ',')
          if [ -z "$MUTATE_PATHS" ]; then
            echo "No domain files found to mutate — skipping"
            exit 0
          fi
          mutmut run \
            --paths-to-mutate "${MUTATE_PATHS%,}" \
            --tests-dir tests/ \
            --runner "python -m pytest tests/ -x -q --tb=no -m 'not integration'" || true
        env:
          APP_ENV: dev

      - name: Report mutation score
        run: |
          python3 - <<'EOF'
          import sqlite3, os, pathlib

          db_path = pathlib.Path(".mutmut-cache")
          if not db_path.exists():
              print("WARN: .mutmut-cache not found")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("## Mutation Testing\n\n⚠️  No mutation cache found — mutmut may not have run.\n")
              raise SystemExit(0)

          conn = sqlite3.connect(db_path)
          rows = conn.execute("SELECT status, count(*) FROM mutant GROUP BY status").fetchall()
          conn.close()

          counts = dict(rows)
          # mutmut 2.x status values: "ok_killed", "bad_survived", "bad_timeout"
          killed = counts.get("ok_killed", 0)
          survived = counts.get("bad_survived", 0)
          timeout = counts.get("bad_timeout", 0)
          total = killed + survived + timeout

          if total == 0:
              print("WARN: No mutants generated")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write("## Mutation Testing\n\n⚠️  No mutants generated — check paths-to-mutate targets domain files.\n")
          else:
              score = (killed / total) * 100
              icon = "✅" if score >= 80 else "⚠️ " if score >= 60 else "🔴"
              print(f"{icon} Mutation score: {score:.1f}% ({killed}/{total} killed, {survived} survived, {timeout} timed out)")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write(f"## Mutation Testing\n\n")
                  f.write(f"{icon} **Mutation score: {score:.1f}%** ({killed}/{total} mutants killed, {survived} survived, {timeout} timed out)\n\n")
                  if score < 80:
                      f.write("Tests cover the code but some assertions are too weak — surviving mutants indicate\n")
                      f.write("places where changing the source doesn't break a test. Run `mutmut results` locally\n")
                      f.write("to see which mutations survived.\n")
          EOF

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('.mutmut-cache') != ''
        with:
          name: mutation-report
          path: .mutmut-cache
          retention-days: 7

  # ── Coverage ─────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage Gate (≥90%)
    runs-on: ubuntu-latest
    needs: [test, integration]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps

      - name: Run coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=90 -q -m "not integration"
        env:
          APP_ENV: dev

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps

      - name: Ruff lint (includes complexity C901)
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps
          pip install bandit pip-audit

      - name: Bandit SAST scan
        run: bandit -r src/ -ll --exclude tests/

      - name: pip-audit dependency vulnerability scan
        run: pip-audit --requirement requirements-lock.txt --strict
        # Fails if any known CVE is found in any installed dependency.
        # Fix: upgrade the vulnerable package and regenerate requirements-lock.txt.

      - name: Check for hardcoded secrets in source
        run: |
          ! grep -rn "api_key\s*=\s*['\"]" src/ tests/ || (echo "HARDCODED SECRET FOUND" && exit 1)
          ! grep -rn "password\s*=\s*['\"]" src/ tests/ || (echo "HARDCODED PASSWORD FOUND" && exit 1)
          ! grep -rn "token\s*=\s*['\"]" src/ tests/ || (echo "HARDCODED TOKEN FOUND" && exit 1)
          echo "No hardcoded secrets found."

      - name: Scan git history for secrets (gitleaks)
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true
        # Requires GITLEAKS_LICENSE secret (gitleaks-action v2 needs a paid license).
        # Step is skipped entirely if the secret is not configured — no noisy error annotations.
        # To enable: add GITLEAKS_LICENSE to repo secrets, then this step runs automatically.

  # ── Container image CVE scan ─────────────────────────────────────────────────
  trivy:
    name: Container CVE Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true   # load into local Docker daemon for Trivy to scan
          tags: scan-target:latest
          cache-from: type=gha

      - name: Trivy — scan OS packages and app dependencies
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: 1          # fails the build on HIGH or CRITICAL CVEs
          severity: HIGH,CRITICAL
          ignore-unfixed: true  # skip CVEs with no available fix yet

  # ── Reproducibility check ────────────────────────────────────────────────────
  lockfile:
    name: Lockfile up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Check lockfile freshness
        run: |
          pip install pip-tools
          cp requirements-lock.txt requirements-lock.check.txt
          pip-compile pyproject.toml --extra dev --extra llm --no-upgrade \
            --output-file requirements-lock.check.txt --quiet
          BODY_A=$(grep -v '^#' requirements-lock.txt)
          BODY_B=$(grep -v '^#' requirements-lock.check.txt)
          if [ "$BODY_A" != "$BODY_B" ]; then
            echo "Lockfile is stale — run 'make lock' to regenerate requirements-lock.txt"
            exit 1
          fi

  # ── SBOM ─────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-lock.txt
          pip install -e ".[dev]" --no-deps
          pip install cyclonedx-bom

      - name: Generate SBOM (CycloneDX JSON)
        run: cyclonedx-py environment -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
        # SBOM is kept for 90 days per build.
        # Enterprise clients requiring SBOM delivery: download from GitHub Actions artifacts.

  # ── Docker build ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with OCI labels)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64
          tags: ${{ github.repository }}:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          # APP_VERSION and GIT_SHA are passed as env vars so /version and
          # startup logs work correctly at runtime (not just as OCI labels)
          APP_VERSION: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}

  # ── SLSA provenance attestation ───────────────────────────────────────────────
  # Generates a signed provenance statement: what was built, from what commit,
  # by which workflow, on which runner. Attached to the GitHub release and
  # verifiable with: gh attestation verify <artifact> --repo <owner/repo>
  # This is SLSA Build Level 1 — free, zero-config, no key management needed.
  provenance:
    name: SLSA Provenance
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      id-token: write   # required for keyless signing via Sigstore
      contents: write   # required to attach attestation to the release
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for attestation
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: Dockerfile
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          tags: ${{ github.repository }}:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: /tmp/image.tar
