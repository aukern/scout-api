# .pre-commit-config.yaml
# Runs checks on every git commit — catches issues before they ever reach CI.
#
# Setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files
#
# Update hook versions:
#   pre-commit autoupdate

repos:
  # ── Ruff: lint + format ──────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]          # auto-fix what can be fixed
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ── Mypy: type checking ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies: []  # add stub packages here if needed

  # ── General file hygiene ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements         # catches leftover breakpoint(), pdb.set_trace()
      - id: detect-private-key       # catches accidentally committed private keys

  # ── Secrets scanning ─────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.3
    hooks:
      - id: gitleaks
        # Blocks commit if a secret pattern is detected.
        # To allow a false positive: add to .gitleaksignore

  # ── Conventional Commits ─────────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        # Enforces: feat|fix|docs|style|refactor|test|chore|ci: description
        # Examples:
        #   feat(nodes): add node creation endpoint
        #   fix(auth): handle expired token gracefully
        #   docs: update CONTRIBUTING.md
